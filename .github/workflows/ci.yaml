# ------------------------------------------------------------------
# CI pipeline — mirrors local Makefile targets
#
# All test/lint/build commands go through `make` so that the Makefile
# remains the single source of truth for how things are run.
# ------------------------------------------------------------------

name: CI

on:
  push:
  pull_request:
    branches:
      - master
      - staging
      - dev

jobs:
  # ================================================================
  # 1. Setup — install deps, build assets, upload artifacts
  # ================================================================
  setup:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: true
      matrix:
        php-versions: ['7.4']
    steps:
      - name: Remove residual containers (act only)
        if: ${{ env.ACT }}
        run: |
          CONTAINERS=$(docker ps -a -q --filter ancestor=mariadb:10.4.10)
          if [ ! -z "$CONTAINERS" ]; then
            docker rm -f $CONTAINERS
          else
            echo "No containers to remove."
          fi

      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@verbose
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer:2.2
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            ./vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install NPM packages
        run: make npm-install

      - name: Install Composer dependencies
        run: make vendor

      - name: Build front-end assets
        run: make encore-build

      - name: Upload vendor/
        uses: actions/upload-artifact@v4
        with:
          name: vendor-dir
          path: vendor/

      - name: Upload public/build/
        uses: actions/upload-artifact@v4
        with:
          name: build-dir
          path: public/build/

  # ================================================================
  # 2. Unit + integration tests (no DB)
  # ================================================================
  fast-tests:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download vendor/
        uses: actions/download-artifact@v4
        with:
          name: vendor-dir
          path: vendor/

      - name: Setup PHP
        uses: shivammathur/setup-php@verbose
        with:
          php-version: '7.4'
          tools: composer:2.2
          extensions: mbstring, xml, ctype, iconv, intl, dom, filter, gd, json

      - name: Set up environment
        run: make env-ci

      - name: Run unit and integration tests
        run: make test-unit

  # ================================================================
  # 3. PHPStan
  # ================================================================
  phpstan:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download vendor/
        uses: actions/download-artifact@v4
        with:
          name: vendor-dir
          path: vendor/

      - name: Setup PHP
        uses: shivammathur/setup-php@verbose
        with:
          php-version: '7.4'
          tools: composer:2.2
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json

      - name: Set up environment
        run: make env-ci

      - name: Run PHPStan
        run: make lint

  # ================================================================
  # 4. Functional tests (with DB)
  # ================================================================
  symfony-tests:
    needs: setup
    runs-on: ubuntu-22.04
    services:
      mariadb:
        image: mariadb:10.4
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: symfony
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Download vendor/
        uses: actions/download-artifact@v4
        with:
          name: vendor-dir
          path: vendor/

      - name: Download public/build/
        uses: actions/download-artifact@v4
        with:
          name: build-dir
          path: public/build/

      - name: Setup PHP
        uses: shivammathur/setup-php@verbose
        with:
          php-version: '7.4'
          tools: composer:2.2
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json

      - name: Set up environment
        run: make env-ci

      - name: Run migrations
        run: make db-migrate

      - name: Run functional tests
        run: make test-func

  # ================================================================
  # 5. Cypress E2E tests
  # ================================================================
  cypress-tests:
    needs: setup
    runs-on: ubuntu-22.04
    services:
      mariadb:
        image: mariadb:10.4
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: symfony
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Download vendor/
        uses: actions/download-artifact@v4
        with:
          name: vendor-dir
          path: vendor/

      - name: Download public/build/
        uses: actions/download-artifact@v4
        with:
          name: build-dir
          path: public/build/

      - name: Install Cypress system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libnss3 libxss1 libasound2 libxtst6 xauth

      - name: Setup PHP
        uses: shivammathur/setup-php@verbose
        with:
          php-version: '7.4'
          tools: composer:2.2
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'

      - name: Install Symfony CLI
        run: |
          curl -sS https://get.symfony.com/cli/installer | bash
          sudo mv /home/runner/.symfony5/bin/symfony /usr/local/bin/symfony

      - name: Set up environment
        run: make env-ci

      - name: Run migrations
        run: make db-migrate

      - name: Load fixtures
        run: make db-fixtures-load

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-cypress-

      - name: Install NPM packages
        run: make npm-install

      - name: Start Symfony server
        run: make serve

      - name: Run Cypress main tests
        run: make test-e2e-main

      - name: Run Cypress shift tests
        run: make test-e2e-shift

      - name: Run Cypress membership tests
        run: make test-e2e-membership

      - name: Set up OIDC environment
        run: make env-ci-oidc

      - name: Start Keycloak
        run: |
          docker run -d \
          --name keycloak \
          -e KC_BOOTSTRAP_ADMIN_USERNAME=admin \
          -e KC_BOOTSTRAP_ADMIN_PASSWORD=admin \
          -v ${{ github.workspace }}/.docker/keycloak/config/realm-export.localhost.json:/opt/keycloak/data/import/realm-export.json \
          -p 8080:8080 \
          quay.io/keycloak/keycloak:26.0 \
          start-dev --import-realm

      - name: Wait for Keycloak
        run: |
          echo "Waiting for Keycloak..."
          for i in $(seq 1 60); do
            if curl --output /dev/null --silent --fail http://localhost:8080/realms/elefan; then
              echo " Keycloak is ready!"
              break
            fi
            printf '.'
            sleep 5
          done

      - name: Run Cypress OIDC tests
        run: make test-e2e-oidc

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7
